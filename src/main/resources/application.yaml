server:
  port: 8080

spring:
  application:
    name: edgecloud-api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: lb://EDGECLOUD-AUTH-SERVICE
              predicates:
                - Path=/api/v1/auth/**

            - id: monitoring-service
              uri: lb://EDGECLOUD-MONITORING-SERVICE
              predicates:
                - Path=/api/v1/monitoring/**

            - id: device-service
              uri: lb://EDGECLOUD-DEVICE-SERVICE
              predicates:
                - Path=/api/v1/devices/**

            - id: alert-service
              uri: lb://EDGECLOUD-ALERT-SERVICE
              predicates:
                - Path=/api/v1/alerts/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info